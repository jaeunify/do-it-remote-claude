services:
  remote-claude-bot:
    build: .
    container_name: remote-claude-bot
    restart: unless-stopped
    env_file:
      - ./discord-claude-bot/.env
    volumes:
      # 호스트의 Claude OAuth 토큰을 컨테이너로 마운트.
      # 호스트에서 미리 `claude login` 으로 로그인되어 있어야 한다.
      # CLAUDE_HOST_DIR 은 호스트 환경변수로 주입 (.env.docker 또는 셸 export).
      # 예) Windows PowerShell: $env:CLAUDE_HOST_DIR="$env:USERPROFILE\.claude"
      #     macOS/Linux:        export CLAUDE_HOST_DIR=$HOME/.claude
      - ${CLAUDE_HOST_DIR}:/home/bot/.claude
